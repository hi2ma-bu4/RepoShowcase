<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Mini Witness Game</title>
	<link rel="stylesheet" href="style.css">
	<script type="module" src="main.js"></script>
</head>
<body>
	<div id="app" class="scene-map">
		<main id="board-viewport">
			<div id="board-shell">
				<canvas id="game-canvas" aria-label="Main puzzle board"></canvas>
			</div>
			<div id="pause-overlay" class="hidden" aria-hidden="true">
				<div id="pause-icon" aria-hidden="true">❚❚</div>
			</div>
		</main>

		<button id="route-toggle" class="edge-btn" type="button" aria-label="Switch route">⟲</button>
		<button id="menu-toggle" class="edge-btn" type="button" aria-label="Open menu">◎</button>

		<div id="menu-overlay" class="hidden" aria-hidden="true">
			<div id="menu-panel">
				<button id="menu-close" type="button" aria-label="Close menu">✕</button>
				<div id="menu-viewport">
					<div id="menu-shell">
						<canvas id="menu-canvas" aria-label="Puzzle menu"></canvas>
					</div>
				</div>
			</div>
		</div>

		<div id="status-pill" class="hidden" aria-live="polite"></div>
		<div id="scene-banner" class="hidden" aria-live="polite"></div>
		<div id="flash-layer" aria-hidden="true"></div>
	</div>
</body>
</html>
