<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BigFloat Function Calculator</title>
	<link rel="icon" href="data:,">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.css" integrity="sha384-UA8juhPf75SzzAMA/4fo3yOU7sBJ0om7SCD2GHq0fZqZco6tr1UCV7nUbk9J90JM" crossorigin="anonymous">
	<link rel="stylesheet" href="./styles.css">
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.js" integrity="sha384-Tt7wBxLKwSzFVRET4O4U9H6v8MNaQ/CjN2FMP4xFm0ErrFu6aNqoonRVW5W40iGI" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/fitty/dist/fitty.min.js"></script>

	<script type="module" src="./main.js"></script>

	<script src="https://hi2ma-bu4.github.io/bio/assets/js/static/auto-gtag.js" async></script>
</head>
<body>
	<div class="app-shell">
		<header class="topbar">
			<strong class="brand-mark">BigFloat</strong>
			<section class="control-row">
				<label class="compact-field">
					<span>Precision</span>
					<input id="precision-input" type="number" min="1" step="1" value="28">
				</label>
				<label class="compact-field wide">
					<div class="compact-roundmode-labels">
						<span>Rounding Mode</span>
						<div id="worker-status" class="status-indicator" title="Idle"></div>
					</div>
					<select id="rounding-mode"></select>
				</label>
			</section>
		</header>

		<div class="workspace">
			<section class="display-card">
				<div class="display-head">
					<div class="display-actions">
						<button id="btn-history-toggle" class="history-toggle" type="button" aria-expanded="false" aria-controls="history-lane">Hist</button>
						<button id="btn-settings-toggle" class="action-button" type="button" aria-label="Settings">⚙</button>
						<button id="btn-left" class="action-button" type="button">←</button>
						<button id="btn-right" class="action-button" type="button">→</button>
						<button id="btn-backspace" class="action-button" type="button">⌫</button>
						<button id="btn-clear" class="action-button accent" type="button">AC</button>
					</div>
				</div>
				<div class="editor-box">
					<textarea id="expression-input" class="expression-input" rows="2" spellcheck="false" aria-label="expression"></textarea>
					<div id="expression-ghost" class="expression-ghost" aria-hidden="true"></div>
				</div>
				<div id="expression-math" class="math-preview"></div>
				<div class="result-card">
					<div class="result-output-wrap">
						<output id="result-output" class="result-output">-</output>
					</div>
				</div>
			</section>

			<section class="keypad-panel">
				<div id="keypad-grid" class="keypad-grid">
					<button class="key function ex" data-group-id="trig" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\sin"></span></span><span class="ex-icon"></span></button>
					<button class="key function ex" data-group-id="power" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\sqrt{x}"></span></span><span class="ex-icon"></span></button>
					<button class="key function ex" data-group-id="logs" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\log"></span></span><span class="ex-icon"></span></button>
					<button class="key function ex" data-group-id="complex" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\text{com}"></span></span><span class="ex-icon"></span></button>
					<button class="key function ex" data-group-id="linear" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\vec{v}"></span></span><span class="ex-icon"></span></button>
					<button class="key function ex" data-group-id="more" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\left|x\right|"></span></span><span class="ex-icon"></span></button>

					<button class="key function swappable" data-insert="(" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="("></span></span></button>
					<button class="key function swappable" data-insert=")" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label=")"></span></span></button>
					<button class="key function swappable" data-insert="[" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="["></span></span></button>
					<button class="key function swappable" data-insert="]" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="]"></span></span></button>
					<button class="key function swappable" data-insert="," type="button"><span class="fit-wrapper"><span class="fit" data-tex-label=","></span></span></button>
					<button class="key function swappable" data-insert="!" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="x!"></span></span></button>

					<button class="key swappable" data-insert="7" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="7"></span></span></button>
					<button class="key swappable" data-insert="8" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="8"></span></span></button>
					<button class="key swappable" data-insert="9" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="9"></span></span></button>
					<button class="key accent swappable" data-insert="/" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\div"></span></span></button>
					<button class="key accent swappable" data-insert="^" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\text{\^{}}"></span></span></button>
					<button class="key function swappable" data-insert="pi" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\pi"></span></span></button>

					<button class="key swappable" data-insert="4" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="4"></span></span></button>
					<button class="key swappable" data-insert="5" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="5"></span></span></button>
					<button class="key swappable" data-insert="6" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="6"></span></span></button>
					<button class="key accent swappable" data-insert="*" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\times"></span></span></button>
					<button class="key accent swappable" data-insert="%" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\text{mod}"></span></span></button>
					<button class="key function swappable" data-insert="i" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="i"></span></span></button>

					<button class="key swappable" data-insert="1" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="1"></span></span></button>
					<button class="key swappable" data-insert="2" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="2"></span></span></button>
					<button class="key swappable" data-insert="3" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="3"></span></span></button>
					<button class="key accent swappable" data-insert="-" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="-"></span></span></button>
					<button class="key function swappable" data-insert="e" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="e"></span></span></button>
					<button class="key function swappable" data-insert="ans" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\text{Ans}"></span></span></button>

					<button class="key span2" data-insert="0" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="0"></span></span></button>
					<button class="key" data-insert="." type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="."></span></span></button>
					<button class="key accent" data-insert="+" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="+"></span></span></button>
					<button class="key function ex" data-group-id="stats" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="\text{sum}"></span><span class="ex-icon"></span></span></button>
					<button id="btn-evaluate" class="key equals" type="button"><span class="fit-wrapper"><span class="fit" data-tex-label="="></span></span></button>
				</div>
			</section>
		</div>

		<section id="history-lane" class="lane history-lane" hidden>
			<div class="lane-title">History</div>
			<ul id="history-list" class="history-list"></ul>
		</section>
	</div>

	<div id="settings-modal" class="modal-overlay" hidden>
		<div class="modal-content">
			<header class="modal-header">
				<strong>Advanced Settings</strong>
				<button id="btn-settings-close" class="close-button" type="button">&times;</button>
			</header>
			<div class="modal-body">
				<label class="setting-item">
					<span>Extra Precision (Library)</span>
					<input id="extra-precision-input" type="number" min="0" step="1" value="6">
				</label>
				<label class="setting-item">
					<span>Trig Funcs Max Steps</span>
					<input id="trig-max-steps-input" type="number" min="1" step="1" value="10000">
				</label>
				<label class="setting-item">
					<span>ln Max Steps</span>
					<input id="ln-max-steps-input" type="number" min="1" step="1" value="50000">
				</label>
				<label class="setting-item">
					<span>Auxiliary Precision (Calculator)</span>
					<input id="aux-precision-input" type="number" min="0" step="1" value="20">
				</label>
			</div>
		</div>
	</div>
</body>
</html>
